
# AutoTrader configuration — CHALLENGE MODE (funded-account simulator, forex majors)
# Practice account = your evaluation simulator. Typical prop rules: hit +8-10%,
# never lose 5% in a day, never 10% total. This bot's built-in caps (-2%/day,
# risk freeze at -6% drawdown) are STRICTER, so a passing run here passes a real eval.

strategy: tjr
min_trade_score: 65
instruments:           # forex majors only — confirmed tradeable on this OANDA division
  - EUR_USD
  - GBP_USD
  - USD_JPY
  - AUD_USD

bracket_pct: 1.5
sl_pct: 1.0            # hard stop — 1% rule
quick_take_usd: 0      # winners ride to structure targets (min 2R)
daily_goal_usd: 300    # challenge pace: +8% on 100k over ~30 days ≈ $270/day; lock in at 300
max_open_trades: 3
max_risk_usd: 1000     # 1% of 100k ceiling (A+ tier); grade tiers size below this
min_risk_usd: 20
max_trades_per_day: 6
poll_seconds: 30

# learning rules
bench_wr_threshold: 0.40
bench_min_trades: 5
prefer_winners: true
bounce_to_green: true
