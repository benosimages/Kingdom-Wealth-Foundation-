# AutoTrader configuration — CHALLENGE MODE (funded-account simulator, forex majors)
# TJR v2 settings — chosen from the 30-day offline backtest (tjr2_report.md):
# score>=50 / RR>=1.2 gave 52 trades, 73% WR, +$23,089, worst day -$136.
# Caveats: no spread/slippage in the model; 30-day sample. Judge live via journal.csv.

strategy: tjr
min_trade_score: 50    # backtest: scores top out at 70 — 80 blocks everything
min_rr: 1.2            # target still = opposing liquidity; 2.0 rejected too many winners
instruments:
  - EUR_USD
  - GBP_USD
  - USD_JPY
  - AUD_USD

bracket_pct: 1.5
sl_pct: 1.0            # hard stop — 1% rule
quick_take_usd: 0      # winners ride to structure targets
daily_goal_usd: 300    # challenge pace: +8% on 100k over ~30 days; lock in at 300
max_open_trades: 3
max_risk_usd: 1000
min_risk_usd: 20
max_trades_per_day: 6
poll_seconds: 30

# learning rules
bench_wr_threshold: 0.40
bench_min_trades: 5
prefer_winners: true
bounce_to_green: true
