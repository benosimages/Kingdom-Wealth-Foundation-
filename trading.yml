
name: trade

on:
  schedule:
    - cron: "25 13 * * 1-5"   # 9:25 AM ET (EDT) — auto-start every market weekday
  workflow_dispatch: {}

permissions:
  contents: write             # lets the job commit journal.csv back to the repo

jobs:
  session:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests pyyaml pandas pandas_ta
      - name: Run trading session
        env:
          OANDA_TOKEN: ${{ secrets.OANDA_TOKEN }}
          OANDA_ACCOUNT: ${{ secrets.OANDA_ACCOUNT }}
          OANDA_ENV: ${{ secrets.OANDA_ENV }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          set -o pipefail
          python bot.py 2>&1 | tee session.log
      - name: Build trade journal (score → outcome record)
        if: always()
        env:
          OANDA_TOKEN: ${{ secrets.OANDA_TOKEN }}
          OANDA_ACCOUNT: ${{ secrets.OANDA_ACCOUNT }}
          OANDA_ENV: ${{ secrets.OANDA_ENV }}
        run: python journal.py session.log || true
      - name: Commit journal
        if: always()
        run: |
          git config user.name "trading-bot"
          git config user.email "bot@users.noreply.github.com"
          git add journal.csv 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "journal: $(date -u +%F) session" && git push)
      - name: Alert phone if the bot failed
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -n "$NTFY_TOPIC" ]; then
            curl -s -d "🚨 TRADING BOT FAILED — check GitHub Actions now. Stops on open trades are still live on OANDA." "https://ntfy.sh/$NTFY_TOPIC"
          fi
