name: trading-bot

on:
  schedule:
    - cron: "25 13 * * 1-5"
    - cron: "10 19 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: trading-bot
  cancel-in-progress: false

permissions:
  contents: write   # lets the job commit journal.csv back to the repo

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run trading session
        env:
          OANDA_TOKEN: ${{ secrets.OANDA_TOKEN }}
          OANDA_ACCOUNT: ${{ secrets.OANDA_ACCOUNT }}
          OANDA_ENV: ${{ secrets.OANDA_ENV }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          set -o pipefail
          python bot.py 2>&1 | tee session.log
      - name: Build trade journal (score → outcome record)
        if: always()
        env:
          OANDA_TOKEN: ${{ secrets.OANDA_TOKEN }}
          OANDA_ACCOUNT: ${{ secrets.OANDA_ACCOUNT }}
          OANDA_ENV: ${{ secrets.OANDA_ENV }}
        run: python journal.py session.log || true
      - name: Commit journal
        if: always()
        run: |
          git config user.name "trading-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase || true
          git add journal.csv 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "journal: $(date -u +%F) session" && git push)
      - name: Nightly tear sheet (quantstats)
        if: always()
        env:
          OANDA_TOKEN: ${{ secrets.OANDA_TOKEN }}
          OANDA_ACCOUNT: ${{ secrets.OANDA_ACCOUNT }}
          OANDA_ENV: ${{ secrets.OANDA_ENV }}
        run: python report.py || true
      - name: Upload tear sheet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tearsheet
          path: reports/
          if-no-files-found: ignore
      - name: Alert phone if the bot failed
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -n "$NTFY_TOPIC" ]; then
            curl -s -d "🚨 TRADING BOT FAILED — check GitHub Actions now. Stops on open trades are still live on OANDA." "https://ntfy.sh/$NTFY_TOPIC"
          fi
